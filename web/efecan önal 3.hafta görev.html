<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trafik Optimizasyon Simülasyonu</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<style>
  :root { --primary: #378ADD; --bg: #f8f9fa; --card-bg: #fff; --text: #1a1a2e; --border: #e0e0e0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); padding: 1.5rem; }
  
  .container { display: flex; flex-wrap: wrap; gap: 20px; max-width: 1200px; margin: 0 auto; }
  .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; }
  
  /* Sol Panel - Kontroller */
  .controls-panel { flex: 1; min-width: 300px; }
  .control-group { margin-bottom: 1.5rem; }
  .control-label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: #444; }
  .control-subtext { font-size: 11px; color: #666; margin-top: 4px; }
  select, input[type="range"] { width: 100%; padding: 8px; border-radius: 8px; border: 1px solid var(--border); outline: none; }
  
  .btn-submit { width: 100%; background: var(--primary); color: #fff; border: none; padding: 12px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
  .btn-submit:hover { background: #2a6dae; }
  .btn-submit:disabled { background: #9bbfe2; cursor: not-allowed; }

  /* Sağ Panel - Harita ve Sonuçlar */
  .visual-panel { flex: 2; min-width: 300px; display: flex; flex-direction: column; gap: 20px; }
  
  .map-placeholder { height: 250px; background: #e9ecef; border-radius: 8px; display: flex; align-items: center; justify-content: center; position: relative; border: 1px dashed #ccc; }
  .alert-badge { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #FCEBEB; color: #A32D2D; padding: 6px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; display: none; border: 1px solid #F7C1C1; }
  
  .results-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; display: none; }
  .result-card { padding: 15px; border-radius: 8px; text-align: center; border: 1px solid var(--border); }
  .result-card.green { background: #EAF3DE; border-color: #C3DDB1; color: #3B6D11; }
  .result-card.blue { background: #E6F0FA; border-color: #B8D4F0; color: #185FA5; }
  .result-card.teal { background: #E0F5F2; border-color: #A8E6DC; color: #0E7C6B; }
  .result-title { font-size: 12px; margin-bottom: 5px; opacity: 0.8; }
  .result-val { font-size: 24px; font-weight: 700; }
</style>
</head>
<body>

<div class="container">
  <!-- SOL PANEL: Kontroller -->
  <div class="card controls-panel">
    <h2 style="font-size:16px; margin-bottom:20px; display:flex; align-items:center; gap:8px;">
      <i class="ti ti-settings" style="color:var(--primary)"></i> Algoritma Parametreleri
    </h2>

    <div class="control-group">
      <label class="control-label">Simülasyon Senaryosu</label>
      <select id="scenario">
        <option value="normal">🚗 Normal Akış</option>
        <option value="accident">💥 Trafik Kazası (Üniversite Kavşağı)</option>
        <option value="roadwork">🚧 Yol Çalışması (Çarşı Merkezi)</option>
      </select>
    </div>

    <div class="control-group">
      <label class="control-label" id="densityLabel">Araç Yoğunluğu Ağırlığı: %50</label>
      <input type="range" id="density" min="0" max="100" value="50">
      <div class="control-subtext">Algoritmanın yoğunluğa vereceği tepki hızı.</div>
    </div>

    <div class="control-group">
      <label class="control-label" id="waitLabel">Maksimum Bekleme Eşiği: 45 sn</label>
      <input type="range" id="waitThresh" min="20" max="120" value="45">
    </div>

    <button id="simBtn" class="btn-submit">
      <i class="ti ti-activity"></i> Simülasyonu Başlat
    </button>
  </div>

  <!-- SAĞ PANEL: Görselleştirme ve Sonuçlar -->
  <div class="visual-panel">
    
    <!-- Harita Alanı -->
    <div class="card" style="flex:1">
      <h3 style="font-size:14px; margin-bottom:12px; display:flex; align-items:center; gap:8px;">
        <i class="ti ti-map"></i> Trafik Akışı (Canlı Simülasyon)
      </h3>
      <div class="map-placeholder">
        <span style="color:#888; font-size:14px;">[Harita Entegrasyon Alanı]</span>
        <div id="alertBadge" class="alert-badge"><i class="ti ti-alert-triangle"></i> Olay Yeri Simüle Ediliyor</div>
      </div>
    </div>

    <!-- Sonuç Metrikleri -->
    <div id="resultsArea" class="results-grid">
      <div class="result-card green">
        <div class="result-title">Trafik Akış Verimi</div>
        <div class="result-val" id="resEfficiency">%0</div>
      </div>
      <div class="result-card blue">
        <div class="result-title">Ortalama Bekleme</div>
        <div class="result-val" id="resWait">0 sn</div>
      </div>
      <div class="result-card teal">
        <div class="result-title">CO2 Azaltımı</div>
        <div class="result-val" id="resCo2">-%0</div>
      </div>
    </div>

  </div>
</div>

<script>
  // Range Input Etkileşimleri
  const densityInput = document.getElementById('density');
  const densityLabel = document.getElementById('densityLabel');
  densityInput.addEventListener('input', (e) => {
    densityLabel.textContent = `Araç Yoğunluğu Ağırlığı: %${e.target.value}`;
  });

  const waitInput = document.getElementById('waitThresh');
  const waitLabel = document.getElementById('waitLabel');
  waitInput.addEventListener('input', (e) => {
    waitLabel.textContent = `Maksimum Bekleme Eşiği: ${e.target.value} sn`;
  });

  // Simülasyon Mantığı
  const simBtn = document.getElementById('simBtn');
  const scenarioInput = document.getElementById('scenario');
  const alertBadge = document.getElementById('alertBadge');
  const resultsArea = document.getElementById('resultsArea');

  simBtn.addEventListener('click', () => {
    // UI Durumunu Güncelle
    simBtn.disabled = true;
    simBtn.innerHTML = '<i class="ti ti-loader"></i> Hesaplanıyor...';
    resultsArea.style.display = 'none';
    
    // Senaryo uyarısını haritada göster
    if (scenarioInput.value !== 'normal') {
      alertBadge.style.display = 'flex';
    } else {
      alertBadge.style.display = 'none';
    }

    // 1.5 saniyelik gecikme ile yapay zeka algoritmasını simüle et
    setTimeout(() => {
      let baseEfficiency = 85;
      let baseWaitTime = 12;
      
      const scenario = scenarioInput.value;
      const densityWeight = parseInt(densityInput.value);
      const waitThreshold = parseInt(waitInput.value);

      if (scenario === 'accident') {
        baseEfficiency -= 30;
        baseWaitTime += 15;
      } else if (scenario === 'roadwork') {
        baseEfficiency -= 15;
        baseWaitTime += 8;
      }

      // Dinamik parametre hesaplaması
      const optimizationBoost = (densityWeight * 0.1) + (waitThreshold * 0.05);
      
      const finalEfficiency = Math.min(100, Math.round(baseEfficiency + optimizationBoost));
      const finalWait = Math.max(2, Math.round(baseWaitTime - (optimizationBoost * 0.2)));
      const finalCo2 = Math.round(optimizationBoost * 1.5);

      // Sonuçları Ekrana Yazdır
      document.getElementById('resEfficiency').textContent = `%${finalEfficiency}`;
      document.getElementById('resWait').textContent = `${finalWait} sn`;
      document.getElementById('resCo2').textContent = `-%${finalCo2}`;

      // UI'ı eski haline getir
      resultsArea.style.display = 'grid';
      simBtn.disabled = false;
      simBtn.innerHTML = '<i class="ti ti-activity"></i> Simülasyonu Başlat';

    }, 1500); // 1.5 saniye bekleme
  });
</script>
</body>
</html>
